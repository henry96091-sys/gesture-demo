<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />

  <!-- 🔥 關鍵：防止 iPad / 手機放大 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>手勢互動系統</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">

    <h1>手勢互動系統</h1>

    <div class="layout">

      <!-- 本機 -->
      <div class="card">
        <h2>本機畫面</h2>

        <div class="videoWrap">
          <video id="localVideo" autoplay playsinline muted></video>
          <canvas id="overlayCanvas"></canvas>
        </div>

        <button id="startCameraBtn">開啟相機</button>
      </div>

      <!-- 遠端 -->
      <div class="card">
        <h2>遠端畫面</h2>

        <div class="videoWrap">
          <video id="remoteVideo" autoplay playsinline></video>
        </div>
      </div>

    </div>

    <div class="card">
      <h2>連線</h2>

      <button id="createPeerBtn">建立我的 ID</button>
      <input id="myId" placeholder="我的 ID" />

      <input id="remoteId" placeholder="輸入對方 ID" />
      <button id="connectBtn">連線</button>

      <button id="sendGestureBtn">送出手勢</button>
    </div>

    <div class="card">
      <h2>手勢</h2>
      <div id="gestureNow">尚未辨識</div>
      <div id="remoteGestureText">尚未收到</div>
    </div>

  </div>

  <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
  <script type="module" src="app.js"></script>

</body>
</html>
